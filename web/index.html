<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!--
    Privacidade: pedimos ao navegador que NÃO cacheie nada, e que NÃO envie
    referrer em links externos. Isso reduz o rastro digital deixado pelo
    acesso à plataforma — proteção direta à usuária.
  -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="referrer" content="no-referrer">

  <meta name="description" content="Site informativo">

  <!-- iOS meta tags & icons (intencionalmente genéricos) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Site">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Título neutro: NÃO denuncia o site em abas/históricos compartilhados. -->
  <title>Site</title>
  <link rel="manifest" href="manifest.json">

  <!--
    NOTA TÉCNICA — RENDERER DO FLUTTER WEB
    ──────────────────────────────────────
    O planejamento original (docs/02_PLANEJAMENTO_FRONTEND.md §2.2) pedia
    o "HTML renderer" para permitir DOM real (acessibilidade WCAG completa,
    VLibras pluggável, SEO indexável).

    Em Flutter 3.27+ o HTML renderer foi DESCONTINUADO. A partir desta
    versão só CanvasKit (`<canvas>`) e Skwasm estão disponíveis. A flag
    `--web-renderer` foi removida do CLI e `window.flutterConfiguration`
    virou ilegal (gera assertion `_usedLegacyConfigStyle` e tela branca
    no boot — bug que vimos em produção, corrigido aqui).

    Trade-offs que isso impõe ao MVP:
      - SEO: páginas não são indexáveis (texto é pixel no canvas)
      - VLibras: só funciona se carregado via JS por fora; precisa testar
      - Screen readers: Flutter já gera um overlay semântico — suficiente
        para a maioria dos casos, mas inferior ao DOM nativo

    Para reativar acessibilidade, basta NÃO mexer aqui — o Flutter já
    instancia o SemanticsBinding por padrão e o overlay semântico do
    CanvasKit já é WCAG-compatível para a maioria dos leitores.
  -->

  <!--
    Slot preparado para VLibras (NÃO ATIVAR no MVP — sem aval do Davi/Silvano).
    Quando aprovado, remover os comentários abaixo:

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
  -->

  <style>
    /* Impede impressão acidental do questionário em andamento.
       Princípio: agressor não deve encontrar uma cópia impressa. */
    @media print {
      body { display: none !important; }
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
